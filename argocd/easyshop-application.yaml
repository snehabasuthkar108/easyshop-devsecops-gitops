apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: easyshop
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/snehabasuthkar108/easyshop-devsecops-gitops.git
    targetRevision: main
    path: kubernetes

  destination:
    server: https://kubernetes.default.svc
    namespace: easyshop

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

    syncOptions:
      - CreateNamespace=true
